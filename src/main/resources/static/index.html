<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StaffFlex CRM | Enterprise Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .glass-dark { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900" x-data="staffFlexApp()" x-cloak>

    <!-- Login Screen -->
    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 p-4">
            <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md animate-fade-in">
                <div class="text-center mb-10">
                    <h1 class="text-3xl font-bold text-slate-800">StaffFlex <span class="text-indigo-600">CRM</span></h1>
                    <p class="text-slate-500 mt-2 text-sm">Enterprise Employee Management System</p>
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Username or Email</label>
                        <input type="text" x-model="loginForm.usernameOrEmail" class="mt-1 block w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none" placeholder="admin">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Password</label>
                        <input type="password" x-model="loginForm.password" class="mt-1 block w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none" placeholder="••••••••">
                    </div>
                    <button @click="login()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg shadow-lg shadow-indigo-200 transition-all flex items-center justify-center space-x-2" :disabled="loading">
                        <template x-if="loading">
                            <svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        </template>
                        <span x-text="loading ? 'Authenticating...' : 'Sign In'"></span>
                    </button>
                    <p x-show="errorMessage" x-text="errorMessage" class="text-red-500 text-center text-xs mt-2"></p>
                </div>
                <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                    <p class="text-xs text-slate-400 font-mono italic">Demo Credentials: admin / password</p>
                </div>
            </div>
        </div>
    </template>

    <!-- Main Dashboard Application -->
    <template x-if="isLoggedIn">
        <div class="flex h-screen bg-slate-50 overflow-hidden">
            
            <!-- Sidebar -->
            <aside class="w-64 bg-slate-900 text-slate-300 flex-shrink-0 flex flex-col transition-all duration-300">
                <div class="p-6">
                    <div class="flex items-center space-x-3 text-white">
                        <div class="bg-indigo-500 p-2 rounded-lg">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                        </div>
                        <span class="text-xl font-bold">StaffFlex <span class="text-indigo-400">CRM</span></span>
                    </div>
                </div>

                <nav class="flex-grow px-4 space-y-1">
                    <a href="#" @click="currentTab = 'dashboard'" :class="currentTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'" class="flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                        <span class="font-medium">Dashboard</span>
                    </a>
                    <a href="#" @click="currentTab = 'employees'" :class="currentTab === 'employees' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'" class="flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 005.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <span class="font-medium">Employees</span>
                    </a>
                    <a href="#" @click="currentTab = 'attendance'" :class="currentTab === 'attendance' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'" class="flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span class="font-medium">Attendance</span>
                    </a>
                    <a href="#" @click="currentTab = 'settings'" :class="currentTab === 'settings' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'" class="flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <span class="font-medium">Settings</span>
                    </a>
                </nav>

                <div class="p-4 mt-auto">
                    <button @click="logout()" class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-red-500 hover:text-white transition-all text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                        <span>Sign Out</span>
                    </button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="flex-grow flex flex-col min-w-0 bg-slate-50 relative">
                
                <!-- Navbar -->
                <header class="h-16 flex items-center justify-between px-8 bg-white border-b border-slate-100 flex-shrink-0 z-10">
                    <h2 class="text-xl font-semibold text-slate-800 capitalize" x-text="currentTab"></h2>
                    <div class="flex items-center space-x-4">
                        <div class="relative">
                            <input type="text" placeholder="Search..." class="bg-slate-50 border-none rounded-full px-4 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 w-64 transition-all">
                        </div>
                        <div class="h-8 w-8 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center font-bold">A</div>
                    </div>
                </header>

                <!-- Scrollable Content -->
                <div class="p-8 overflow-y-auto flex-grow h-0">
                    
                    <!-- Dashboard Section -->
                    <div x-show="currentTab === 'dashboard'" class="space-y-8 animate-fade-in">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                <p class="text-slate-400 text-sm font-medium">Total Employees</p>
                                <h3 class="text-3xl font-bold text-slate-800 mt-2" x-text="employees.length">0</h3>
                                <div class="mt-4 flex items-center text-emerald-500 text-xs">
                                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                                    <span>+12% from last month</span>
                                </div>
                            </div>
                            <div class="bg-indigo-600 p-6 rounded-2xl shadow-lg shadow-indigo-200">
                                <p class="text-indigo-100 text-sm font-medium">Active Attendance</p>
                                <h3 class="text-3xl font-bold text-white mt-2">94%</h3>
                                <div class="mt-4 flex items-center text-indigo-100 text-xs">
                                    <span>Updated 5 mins ago</span>
                                </div>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                <p class="text-slate-400 text-sm font-medium">Open Tasks</p>
                                <h3 class="text-3xl font-bold text-slate-800 mt-2">24</h3>
                                <div class="mt-4 flex items-center text-amber-500 text-xs text-xs">
                                    <span>8 pending review</span>
                                </div>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                <p class="text-slate-400 text-sm font-medium">Pending Leaves</p>
                                <h3 class="text-3xl font-bold text-slate-800 mt-2">07</h3>
                                <div class="mt-4 flex items-center text-indigo-500 text-xs">
                                    <span>Requires HR attention</span>
                                </div>
                            </div>
                        </div>

                        <!-- Real-time Chart Placeholder -->
                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                            <div class="flex items-center justify-between mb-8">
                                <h4 class="font-bold text-slate-800 text-lg">Workforce Trends</h4>
                                <select class="text-sm border-slate-200 rounded-lg">
                                    <option>Last 30 days</option>
                                    <option>This year</option>
                                </select>
                            </div>
                            <div class="h-64 flex items-end justify-between space-x-2">
                                <template x-for="n in [40, 70, 50, 90, 60, 80, 100, 60, 40, 90, 30, 80]">
                                    <div class="w-full bg-indigo-50 rounded-t-lg relative group transition-all" :style="'height: ' + n + '%'">
                                        <div class="absolute inset-0 bg-indigo-500 rounded-t-lg scale-y-0 group-hover:scale-y-100 transition-transform origin-bottom"></div>
                                    </div>
                                </template>
                            </div>
                            <div class="mt-4 pt-4 border-t border-slate-50 flex justify-between text-xs text-slate-400">
                                <span>Jan</span><span>Feb</span><span>Mar</span><span>Apr</span><span>May</span><span>Jun</span><span>Jul</span><span>Aug</span><span>Sep</span><span>Oct</span><span>Nov</span><span>Dec</span>
                            </div>
                        </div>
                    </div>

                    <!-- Employees Section -->
                    <div x-show="currentTab === 'employees'" class="animate-fade-in space-y-6">
                        <div class="flex items-center justify-between">
                            <h4 class="text-xl font-bold text-slate-800">Employee Directory</h4>
                            <button @click="openAddModal()" class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-medium shadow-md shadow-indigo-100 hover:bg-indigo-700 transition-all flex items-center">
                                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                Add Employee
                            </button>
                        </div>

                        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 border-b border-slate-100">
                                    <tr>
                                        <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Employee</th>
                                        <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Contact</th>
                                        <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</th>
                                        <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Joining Date</th>
                                        <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    <template x-for="emp in employees" :key="emp.id">
                                        <tr class="hover:bg-slate-50 transition-colors group">
                                            <td class="px-6 py-4">
                                                <div class="flex items-center space-x-3">
                                                    <div class="h-10 w-10 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-600" x-text="emp.firstName.charAt(0)"></div>
                                                    <div>
                                                        <div class="font-semibold text-slate-800" x-text="emp.firstName + ' ' + emp.lastName"></div>
                                                        <div class="text-xs text-slate-400">Software Engineer</div>
                                                    </div>
                                                </div>
                                            </td>
                                            <td class="px-6 py-4">
                                                <div class="text-sm text-slate-600" x-text="emp.email"></div>
                                                <div class="text-xs text-slate-400" x-text="emp.mobileNumber || 'N/A'"></div>
                                            </td>
                                            <td class="px-6 py-4 text-sm">
                                                <span :class="emp.status === 'ACTIVE' ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-500'" class="px-3 py-1 rounded-full text-xs font-semibold" x-text="emp.status"></span>
                                            </td>
                                            <td class="px-6 py-4 text-sm text-slate-500" x-text="emp.joiningDate || 'N/A'"></td>
                                            <td class="px-6 py-4 text-right space-x-2">
                                                <button class="p-1 text-slate-400 hover:text-indigo-600 transition-colors">
                                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                                </button>
                                                <button @click="deleteEmployee(emp.id)" class="p-1 text-slate-400 hover:text-red-500 transition-colors">
                                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                                </button>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                            <div x-show="employees.length === 0" class="p-20 text-center">
                                <div class="inline-block p-4 rounded-full bg-slate-50 mb-4 animate-bounce">
                                    <svg class="w-12 h-12 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                </div>
                                <p class="text-slate-400">No employees found in the records.</p>
                            </div>
                        </div>
                    </div>

                    <!-- Attendance Section -->
                    <div x-show="currentTab === 'attendance'" class="animate-fade-in space-y-8">
                        <div class="bg-indigo-600 rounded-3xl p-12 text-white text-center relative overflow-hidden shadow-2xl shadow-indigo-200">
                            <div class="relative z-10">
                                <h1 class="text-4xl font-bold mb-4">Good Morning, Admin!</h1>
                                <p class="text-indigo-100 mb-8 max-w-lg mx-auto">Ready to start your productive day? Punch in to record your attendance for June 3rd, 2026.</p>
                                <div class="flex flex-col md:flex-row items-center justify-center space-y-4 md:space-y-0 md:space-x-4">
                                    <button @click="punchIn()" class="bg-white text-indigo-600 px-10 py-4 rounded-2xl font-bold shadow-xl hover:scale-105 transition-transform">
                                        PUNCH IN
                                    </button>
                                    <button class="bg-indigo-500 text-white px-10 py-4 rounded-2xl font-bold shadow-xl opacity-50 cursor-not-allowed">
                                        PUNCH OUT
                                    </button>
                                </div>
                            </div>
                            <div class="absolute -top-24 -right-24 w-64 h-64 bg-indigo-500 rounded-full opacity-50 blur-3xl"></div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                                <h5 class="font-bold text-slate-800 mb-6 flex items-center">
                                    <div class="w-2 h-2 bg-indigo-500 rounded-full mr-2"></div>
                                    Quick Stats
                                </h5>
                                <div class="space-y-4">
                                    <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl">
                                        <span class="text-sm font-medium text-slate-600">Avg. Punch In</span>
                                        <span class="font-bold text-slate-800 font-mono">08:45 AM</span>
                                    </div>
                                    <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl">
                                        <span class="text-sm font-medium text-slate-600">Late Days</span>
                                        <span class="font-bold text-rose-500 font-mono">02 Days</span>
                                    </div>
                                    <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl">
                                        <span class="text-sm font-medium text-slate-600">Total Hours</span>
                                        <span class="font-bold text-indigo-600 font-mono">156.5 Hrs</span>
                                    </div>
                                </div>
                            </div>
                            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                                <h4 class="font-bold text-slate-800 mb-6">Recent Activity</h4>
                                <div class="space-y-4">
                                    <template x-for="i in [1, 2, 3]">
                                        <div class="flex items-center space-x-4 p-4 border-b border-slate-50 last:border-0">
                                            <div class="bg-emerald-100 text-emerald-600 p-2 rounded-lg">
                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                            </div>
                                            <div class="flex-grow">
                                                <p class="text-sm font-semibold text-slate-800">Checked In</p>
                                                <p class="text-xs text-slate-400">June 2nd, 08:52 AM</p>
                                            </div>
                                            <span class="text-xs font-mono text-slate-400">SUCCESS</span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Settings & Other placeholders -->
                    <div x-show="currentTab === 'settings'" class="animate-fade-in flex flex-col items-center justify-center h-full text-center">
                        <div class="bg-white p-12 rounded-3xl shadow-xl w-full max-w-xl">
                            <h3 class="text-2xl font-bold text-slate-800 mb-4">System Settings</h3>
                            <div class="space-y-6 text-left">
                                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl">
                                    <div>
                                        <p class="font-semibold text-slate-800">Dark Mode</p>
                                        <p class="text-xs text-slate-400">Switch between light and dark themes</p>
                                    </div>
                                    <div class="w-12 h-6 bg-slate-300 rounded-full relative cursor-pointer">
                                        <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-all"></div>
                                    </div>
                                </div>
                                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl">
                                    <div>
                                        <p class="font-semibold text-slate-800">Email Notifications</p>
                                        <p class="text-xs text-slate-400">Receive alerts for new tasks and leaves</p>
                                    </div>
                                    <div class="w-12 h-6 bg-indigo-500 rounded-full relative cursor-pointer">
                                        <div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full transition-all"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </template>

    <script>
        function staffFlexApp() {
            return {
                isLoggedIn: false,
                currentTab: 'dashboard',
                loading: false,
                errorMessage: '',
                loginForm: {
                    usernameOrEmail: '',
                    password: ''
                },
                employees: [],
                currentUser: null,
                token: localStorage.getItem('jwt_token'),

                init() {
                    if (this.token) {
                        this.isLoggedIn = true;
                        this.fetchEmployees();
                    }
                },

                async login() {
                    this.loading = true;
                    this.errorMessage = '';
                    try {
                        const response = await axios.post('http://localhost:8080/api/auth/login', this.loginForm);
                        this.token = response.data.accessToken;
                        localStorage.setItem('jwt_token', this.token);
                        this.isLoggedIn = true;
                        this.fetchEmployees();
                    } catch (error) {
                        console.error('Login failed', error);
                        // For demo purposes, allow login with any data if server is not reachable
                        this.errorMessage = 'Network Error. Check if backend is running at :8080. Entering Demo Mode.';
                        setTimeout(() => {
                            this.isLoggedIn = true;
                            this.loading = false;
                        }, 1000);
                    } finally {
                        this.loading = false;
                    }
                },

                logout() {
                    localStorage.removeItem('jwt_token');
                    this.isLoggedIn = false;
                    this.token = null;
                },

                async fetchEmployees() {
                    try {
                        const response = await axios.get('http://localhost:8080/api/employees', {
                            headers: { Authorization: `Bearer ${this.token}` }
                        });
                        this.employees = response.data;
                    } catch (error) {
                        console.error('Failed to fetch employees', error);
                        // Mock data for display if API fails
                        this.employees = [
                            { id: 1, firstName: 'Shahariyr', lastName: 'Reza', email: 'reza@mail.com', status: 'ACTIVE', joiningDate: '2025-01-10' },
                            { id: 2, firstName: 'Emma', lastName: 'Watson', email: 'emma@mail.com', status: 'ON_LEAVE', joiningDate: '2025-02-15' }
                        ];
                    }
                },

                async punchIn() {
                    alert('Attendance recorded for June 3rd, 12:00 PM');
                },

                deleteEmployee(id) {
                    if(confirm('Are you sure you want to remove this employee?')) {
                        this.employees = this.employees.filter(e => e.id !== id);
                        alert('Employee removed (Simulation)');
                    }
                },

                openAddModal() {
                    alert('Employee Onboarding workflow triggered. This will open a multi-step form.');
                }
            }
        }
    </script>

    <style>
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</body>
</html>
